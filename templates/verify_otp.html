<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Capizonda Dental Clinic</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/verify_otp.css') }}">
</head>
<body>

<div class="verify-container">
    <h2>Email Verification</h2>

    <p>
        A verification code was sent to<br>
        <b>{{ email }}</b>
    </p>

    <form method="POST">
        <input
            type="text"
            name="otp"
            maxlength="6"
            placeholder="Enter OTP"
            required
        >

        <button type="submit">
            Verify
        </button>
    </form>

    <a href="{{ url_for('resend_otp', uid=request.view_args['uid']) }}" class="resend-link">
        Resend Code
    </a>
</div>

</body>
</html>
