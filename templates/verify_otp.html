<!DOCTYPE html>
<html>
<head>
    <title>Verify Email</title>
</head>
<body>

<h2>Email Verification</h2>

<p>
A verification code was sent to
<b>{{ email }}</b>
</p>

<form method="POST">

    <input
        type="text"
        name="otp"
        maxlength="6"
        placeholder="Enter OTP"
        required
    >

    <button type="submit">  
        Verify
    </button>

</form>

<br>

<a href="{{ url_for('resend_otp', uid=request.view_args['uid']) }}">
Resend Code
</a>

</body>
</html>
